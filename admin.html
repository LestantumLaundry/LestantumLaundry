<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Lestantum Laundry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">
    <nav class="navbar admin-nav">
        <div class="logo"><strong>LESTANTUM</strong> ADMIN</div>
        <a href="index.html" class="btn-back">Lihat Website</a>
    </nav>

    <section class="admin-container">
        <div class="income-dashboard">
            <h3>💰 PENDAPATAN HARI INI</h3>
            <h1 id="todayIncome">Rp 0</h1>
            <hr>
            <p>📅 Total Bulan Ini: <strong id="monthlyIncome">Rp 0</strong></p>
        </div>

        <div class="monthly-report">
            <h4>📊 Riwayat Pendapatan Bulanan</h4>
            <div class="table-mini">
                <table>
                    <thead>
                        <tr>
                            <th>Periode</th>
                            <th style="text-align: right;">Total Omzet</th>
                        </tr>
                    </thead>
                    <tbody id="monthlyHistoryBody">
                        </tbody>
                </table>
            </div>
        </div>

        <hr class="divider">

        <h2>Tambah Pesanan Baru</h2>
        <form id="laundryForm" class="admin-form">
            <input type="text" id="custName" placeholder="Nama Pelanggan" required>
            <select id="serviceType">
                <option value="Laundry">Laundry (Cuci)</option>
                <option value="Ironing">Ironing (Setrika)</option>
            </select>
            <input type="number" id="price" placeholder="Harga (Rp)" required>
            <input type="text" id="dropDate" placeholder="Tgl Taruh (DD/MM)">
            <input type="text" id="pickDate" placeholder="Tgl Ambil (DD/MM)">
            <button type="submit" class="btn-add">SIMPAN DATA</button>
        </form>

        <h2>Daftar Kelola Laundry</h2>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Nama</th>
                        <th>Layanan</th> 
                        <th>Harga</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody">
                    </tbody>
            </table>
        </div>
    </section>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
