<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lestantum Laundry - Beranda</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Lestantum Laundry</div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="admin.html" class="btn-admin">Admin</a></li>
        </ul>
    </nav>

    <header class="hero">
        <div class="hero-text">
            <h1>Welcome to <span>Lestantum</span> Laundry</h1>
            <p>Clean & Fresh Laundry Services</p>
            <button class="btn-book">Book Now</button>
        </div>
        <div class="hero-image">
            <img src="images/baju.png" alt="Setrika">
        </div>
    </header>

    <section class="status-section">
        <h2>Customer Laundry Status</h2>
        <div class="table-responsive">
            <table id="customerTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Service</th>
                        <th>Price</th> <th>Drop Off Date</th>
                        <th>Pickup Date</th>
                    </tr>
                </thead>
                <tbody id="customerTableBody">
                    </tbody>
            </table>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-grid">
            <div class="footer-left">
                <h3>Buka jam</h3>
                <p>Senin - Minggu: 9:00 pagi - 6:00 sore</p>
            </div>
            <div class="footer-right">
                <h3>Panggil Kami</h3>
                <div class="contact-card">
                    <p>📞 +62 812-3456-7890</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script src="script.js"></script>
</body>
</html>
